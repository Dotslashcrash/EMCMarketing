name: Azure Static Web Apps CI/CD - EMC Marketing Reimagined

on:
  push:
    branches:
      - codex/reimagined-azure-site
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next export
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://yellow-plant-05a58a310.7.azurestaticapps.net

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_EMCMARKETING_REIMAGINED }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          skip_app_build: true
